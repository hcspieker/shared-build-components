name: Reusable Workflow to Build and Test a Docker Image for .NET Applications and Prepare Deployment Compose File

on:
  workflow_call:
    inputs:
      runner-name:
        description: 'Name of the github action runner'
        required: false
        type: string
        default: 'ubuntu-latest'
      docker-test-platform:
        description: 'Target platform for the Docker test build. Must be a single platform (e.g. linux/amd64)'
        required: false
        type: string
        default: 'linux/amd64'
      image-name:
        description: 'Name of the docker image'
        required: true
        type: string
      docker-build-context:
        description: 'Path to the Docker build context directory relative to the repository root'
        required: true
        type: string
      docker-test-target-name:
        description: 'Name of the test-target in dockerfile'
        required: false
        type: string
        default: 'test'
      docker-test-directory-name:
        description: 'Directory which contains the testresults in the docker container'
        required: false
        type: string
        default: 'testresults'

jobs:
  build:
    name: Build and push ${{ inputs.image-name }} Docker image
    runs-on: ${{ inputs.runner-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and test Docker image
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ inputs.docker-test-platform }}
          context: ${{ inputs.docker-build-context }}
          push: false
          load: true
          tags: ${{ inputs.image-name }}:test
          target: ${{ inputs.docker-test-target-name }}

      - name: Run extract tests from Docker image
        run: |
          set -eu
          cid=$(docker create ${{ inputs.image-name }}:test)
          mkdir -p testresults
          docker cp $cid:/${{ inputs.docker-test-directory-name }}/. testresults/
          docker rm -f $cid

          echo "Extracted test results:"
          ls -laR testresults

      - name: Publish test results
        uses: dorny/test-reporter@v2
        with:
          name: Unit Tests
          path: testresults/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload TRX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-results-trx
          path: testresults/*.trx

      - name: Build final Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.docker-build-context }}
          push: false
          tags: ${{ inputs.image-name }}:latest
